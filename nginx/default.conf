# ─── Upstreams ──────────────────────────────────────────────────────────────
upstream admin_app {
    server admin:3001;
}

upstream blog_app {
    server blog:3000;
}

upstream blog2_app {
    server blog2:3000;
}

# ─── Admin Dashboard ────────────────────────────────────────────────────────
# Change server_name to your admin domain (e.g. admin.postloom.com)
server {
    listen 80;
    server_name admin.postloom.local;

    client_max_body_size 10M;

    location / {
        proxy_pass http://admin_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Blog (default) ─────────────────────────────────────────────────────────
# Change server_name to your blog domain (e.g. fitlifehub.com)
server {
    listen 80 default_server;
    server_name blog1.postloom.local;

    location / {
        proxy_pass http://blog_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Blog 2 (cooking) ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name blog2.postloom.local;

    location / {
        proxy_pass http://blog2_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

